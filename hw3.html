<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>
    <form>
 <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td bgcolor="pink"><h3>Emergency Contact Info</h3> </td>
    </tr>

</table>
<br>
 <table  width=100% cellpadding="10" cellspacing="10">
        <tr>
            <td width="10%">First name</td>
            <td width="40%"><input type="text"/></td>
            <td width="50" colspan="2" align="left"><u>Emergency Contact info</u></td>
        </tr>
        <tr>
            <td width="10">Last Name</td>
            <td width="40"><input type="text"/></td>

            <td width="40"><input type="text"/></td>
        </tr>
        <tr>
            <td width="10">Gender</td>

                <select>
                    <option value="male">male</option>
                    <option value="female">female</option>
                </select>
            </td>
            <td width="10">Relationship</td>
            <td width="40"><input type="text"/></td>
        </tr>
         <tr>
            <td width="50" valign="top" colspan="2">Date of birth&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp&nbsp<input type="date"><br><br> <u>Medical information</u></td>
            <td width="10" valign="top">Address</td>
            <td width="40"><textarea rows="5" ></textarea>
        </tr>
        <tr>
            <td width="10">Hospital preference</td>
            <td width="40"><input type="text"/></td>
            <td width="10">city</td>
            <td width="40"><input type="text"/></td>
        </tr>
        <tr>
            <td width="10">Insurance Company</td>
            <td width="40"><input type="text"/></td>
            <td width="10">state</td>
            <td width="40"><select>
                    <option value="select" selected>select</option>
                    <option value="a">a</option>
                    <option value="b">b</option>
                </select>

            </td>
        </tr>
        <tr>
            <td width="10">Policy number> </td>
            <td width="40"><input type="text"/></td>
            <td width="10">Country</td>
            <td width="40"><select>
                    <option value="select" selected>select</option>
                    <option value="a">a</option>
                    <option value="b">b</option>
                </select>
        </tr>
 <tr>
            <td width="10">Physician's Name</td>
            <td width="40"><input type="text"/></td>
            <td width="10">Home phone</td>
            <td width="40"><input type="text"/></td>
        </tr>
        <tr>
            <td width="10">Phone number</td>
            <td width="40"><input type="text"/></td>
            <td width="10">Work phone</td>
            <td width="40"><input type="text"/></td>
        </tr>
        <tr>
            <td width="10">allergies (if any)</td>
            <td width="40"><textarea rows="5"></textarea></td>
             
        </tr>
    </table>
    <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td bgcolor="grey" align="right" width="50%"><input type="submit"/> </td>
        <td bgcolor="grey"><input type="reset"/> </td>
    </tr>
</table>
</form>
